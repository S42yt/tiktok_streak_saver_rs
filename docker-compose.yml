services:
  tiktok-streak-bot:
    build: .
    container_name: tiktok-streak-bot
    restart: unless-stopped
    # Chrome needs adequate shared memory
    shm_size: "2gb"
    # Headless daily scheduler — the TUI needs a real terminal and can't run
    # in a detached container (fails with "No such device or address").
    command: ["tiktok-streak-saver", "schedule"]
    volumes:
      # Config and cookies (read-only)
      - ./data/config.toml:/app/config.toml:ro
      - ./data/cookies.json:/app/cookies.json:ro
      - ./data/cookies.txt:/app/cookies.txt:ro
      # Persist logs
      - ./data:/app/data
    environment:
      # Set to your local timezone so the schedule fires correctly
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
